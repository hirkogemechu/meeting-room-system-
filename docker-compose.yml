services:
  postgres:
    image: postgres:15-alpine
    container_name: meeting-room-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: meeting_room_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: meeting-room-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres123@postgres:5432/meeting_room_db
      JWT_ACCESS_SECRET: your-super-secret-access-key-change-this
      JWT_REFRESH_SECRET: your-super-secret-refresh-key-change-this
      JWT_ACCESS_EXPIRY: 15mCLEAN
      JWT_REFRESH_EXPIRY: 7dcls
      COOKIE_SECURE: "false"
      CORS_ORIGIN: http://localhost:3001
    ports:
      - "3000:3000"
    command: sh -c "npx prisma migrate deploy && node server.js"

volumes:
  postgres_data: