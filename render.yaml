services:
  - type: web
    name: meeting-room-system
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: meeting-room-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        value: production-secret-key-2024
      - key: JWT_REFRESH_SECRET
        value: production-refresh-key-2024
      - key: JWT_ACCESS_EXPIRY
        value: 15m
      - key: JWT_REFRESH_EXPIRY
        value: 7d
      - key: COOKIE_SECURE
        value: true
      - key: CORS_ORIGIN
        value: https://meeting-room-hirko.netlify.app,https://jade-dango-483328.netlify.app
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: hirkogemechu10@gmail.com
      - key: SMTP_PASS
        value: your-new-app-password

databases:
  - name: meeting-room-db
    plan: free